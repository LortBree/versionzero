# versionzero - Foot Terminal Configuration
# ~/.config/foot/foot.ini

[main]
font=JetBrains Mono Nerd Font:size=12:weight=medium
# font=Fira Code Nerd Font:size=12:weight=medium
# font=Cascadia Code PL:size=12:weight=medium
dpi-aware=no
pad=16x16
shell=fish
term=xterm-256color
login-shell=no

[bell]
urgent=no
notify=no
visual=no

[scrollback]
lines=10000
multiplier=3.0
indicator-position=relative
indicator-format="line %l/%L"

[url]
launch=xdg-open ${url}
label-letters=sadfjklewcmpgh
osc8-underline=url-mode
protocols=http, https, ftp, ftps, file, gemini, gopher
uri-characters=abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-_.,~:;/?#@!$&%*+="'()[]

[cursor]
style=beam
color=FFFFFF 1F1C2C
blink=yes
beam-thickness=2.0
underline-thickness=2.0

[mouse]
hide-when-typing=yes
alternate-scroll-mode=yes

[colors]
# Theme 1 - Purple Glassmorphism
# These colors will be injected by the color script

# Base colors
foreground=FFFFFF
background=1F1C2C

# Transparency for glassmorphism effect
alpha=0.85

# Normal colors (0-7)
regular0=1F1C2C  # black
regular1=FF6B9D  # red
regular2=61E8A6  # green  
regular3=FFD93D  # yellow
regular4=74B9FF  # blue
regular5=C44FFF  # magenta
regular6=54E6E6  # cyan
regular7=FFFFFF  # white

# Bright colors (8-15)
bright0=928DAB   # bright black (gray)
bright1=FF8FA3  # bright red
bright2=7EEAA7  # bright green
bright3=FFDC5E  # bright yellow
bright4=81C3FF  # bright blue
bright5=D770FF  # bright magenta
bright6=6BEDED  # bright cyan
bright7=FFFFFF  # bright white

# Selection colors
selection-foreground=FFFFFF
selection-background=928DAB

# Search colors
search-box-no-match=FF6B9D FFFFFF
search-box-match=61E8A6 1F1C2C

# Jump label colors
jump-labels=1F1C2C FFFFFF

[csd]
# Client-side decorations
preferred=server
size=26
font=JetBrains Mono Nerd Font:size=11:weight=bold
color=928DAB
hide-when-maximized=no
double-click-to-maximize=yes
border-width=2
border-color=928DAB

[key-bindings]
# Clipboard
clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste

# Font size
font-increase=Control+plus Control+equal Control+KP_Add
font-decrease=Control+minus Control+KP_Subtract
font-reset=Control+0 Control+KP_0

# Search
search-start=Control+Shift+f
search-cancel=Control+g Escape
search-commit=Return
search-find-prev=Control+Shift+g
search-find-next=Control+g

# URLs
show-urls-launch=Control+Shift+o
show-urls-copy=Control+Shift+i

# Scrolling
scrollback-up-page=Shift+Page_Up
scrollback-up-half-page=Control+Shift+Page_Up
scrollback-up-line=Control+Shift+Up
scrollback-down-page=Shift+Page_Down
scrollback-down-half-page=Control+Shift+Page_Down
scrollback-down-line=Control+Shift+Down
scrollback-home=Control+Shift+Home
scrollback-end=Control+Shift+End

# Window management
minimize=none
maximize=none
fullscreen=F11
pipe-visible=[sh -c "xurls | fuzzel --dmenu | xargs -r firefox"] none
pipe-scrollback=[sh -c "xurls | fuzzel --dmenu | xargs -r firefox"] none

# Selection and mouse
select-begin=Control+Shift+space
select-begin-block=Control+Shift+b
select-extend=Shift+Right Shift+Left
select-extend-character-wise=Control+Shift+Right Control+Shift+Left
select-word=Control+Shift+w
select-word-whitespace=Control+Shift+a
select-row=Shift+space